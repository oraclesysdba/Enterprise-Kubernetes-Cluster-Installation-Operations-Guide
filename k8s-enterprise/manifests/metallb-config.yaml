---
# MetalLB IP Address Pool
# Defines the range of IPs MetalLB can assign to LoadBalancer services
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: enterprise-pool
  namespace: metallb-system
spec:
  addresses:
    # IP range for LoadBalancer services (adjust to your network)
    - 192.168.56.200-192.168.56.220
  autoAssign: true

---
# MetalLB L2 Advertisement
# Enables Layer 2 mode for the address pool
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: enterprise-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - enterprise-pool
  # Advertise on all interfaces
  nodeSelectors:
    - matchLabels: {}
