---
# Enterprise RBAC - Namespace-Level Policies
# Creates standard namespaces with appropriate RBAC bindings

# ─── Production Namespace ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    environment: production
    enterprise.io/managed: "true"

---
apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    environment: staging
    enterprise.io/managed: "true"

---
apiVersion: v1
kind: Namespace
metadata:
  name: development
  labels:
    environment: development
    enterprise.io/managed: "true"

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    environment: infrastructure
    enterprise.io/managed: "true"

---
# ─── Resource Quotas for Production ─────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-quota
  namespace: production
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "20"
    secrets: "50"
    configmaps: "50"

---
# ─── Resource Quotas for Staging ─────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: staging-quota
  namespace: staging
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "30"
    services: "15"
    persistentvolumeclaims: "10"

---
# ─── Resource Quotas for Development ────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: development-quota
  namespace: development
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "30"
    services: "15"
    persistentvolumeclaims: "10"

---
# ─── Limit Ranges for Production ────────────────────────────────────────
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  namespace: production
spec:
  limits:
    - default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
      type: Container

---
# ─── Limit Ranges for Staging ───────────────────────────────────────────
apiVersion: v1
kind: LimitRange
metadata:
  name: staging-limits
  namespace: staging
spec:
  limits:
    - default:
        cpu: "250m"
        memory: "256Mi"
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      max:
        cpu: "2"
        memory: "4Gi"
      min:
        cpu: "25m"
        memory: "32Mi"
      type: Container

---
# ─── Limit Ranges for Development ───────────────────────────────────────
apiVersion: v1
kind: LimitRange
metadata:
  name: development-limits
  namespace: development
spec:
  limits:
    - default:
        cpu: "250m"
        memory: "256Mi"
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      max:
        cpu: "2"
        memory: "4Gi"
      min:
        cpu: "25m"
        memory: "32Mi"
      type: Container
