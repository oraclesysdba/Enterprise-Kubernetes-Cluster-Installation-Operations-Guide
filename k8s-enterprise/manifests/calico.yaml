---
# Calico Custom Resources for Enterprise Kubernetes
# This configures the Calico networking after the operator is deployed
apiVersion: operator.tigera.io/v1
kind: Installation
metadata:
  name: default
spec:
  # Calico networking
  calicoNetwork:
    # Pod CIDR - must match kubeadm --pod-network-cidr
    ipPools:
      - name: default-ipv4-ippool
        blockSize: 26
        cidr: 10.244.0.0/16
        encapsulation: VXLANCrossSubnet
        natOutgoing: Enabled
        nodeSelector: all()
    # Use Linux dataplane for best performance
    linuxDataplane: Iptables
    # Multi-interface handling
    multiInterfaceMode: None
    nodeAddressAutodetectionV4:
      firstFound: true

---
# Calico API Server for enterprise management
apiVersion: operator.tigera.io/v1
kind: APIServer
metadata:
  name: default
spec: {}
