---
# Allow DNS Traffic Network Policy
# Required for pods to resolve service names via CoreDNS
# Applied to all namespaces with default-deny policies

# ─── Production: Allow DNS ───────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: production
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

